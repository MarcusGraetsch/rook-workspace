name: Review Agent

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:
  # Code Quality Gates
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run linting checks
        run: |
          pip install flake8 black isort mypy
          
          # Python linting
          flake8 . --max-line-length=100 --ignore=E501,W503 --per-file-ignores='__init__.py:F401' || true
          black --check . || true
          isort --check . || true
          
          # Type checking
          mypy . --ignore-missing-imports || true
        continue-on-error: true

      - name: Check for sensitive data
        run: |
          pip install detect-secrets
          detect-secrets scan --disable-plugin AWSKeyDetector > .secrets.baseline || true

      - name: Review Code Changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            let report = '## 📋 Code Review Report\n\n';
            report += '### Files Changed: ' + files.length + '\n\n';
            
            const issues = [];
            files.forEach(file => {
              const lines = file.patch?.split('\n') || [];
              if (lines.length > 300) {
                issues.push(`⚠️ **${file.filename}**: ${lines.length} lines changed - consider splitting`);
              }
              if (file.status === 'added' && file.additions > 100) {
                issues.push(`⚠️ **${file.filename}**: ${file.additions} new lines - needs thorough review`);
              }
            });
            
            if (issues.length > 0) {
              report += '### Observations:\n' + issues.join('\n');
            } else {
              report += '✅ No major concerns detected\n';
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

  # Security Review
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript, typescript

      - name: Build
        run: |
          pip install -e . 2>/dev/null || true
          npm install 2>/dev/null || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python,javascript,typescript"
          upload: true

      - name: Dependency vulnerability scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  # Dependency Check
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Python dependencies
        run: |
          pip install pip-audit
          pip-audit || true

      - name: Check for outdated dependencies
        run: |
          pip install pip-check-updates
          pcu -r || true

  # Comment summary on PR
  pr-summary:
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, dependencies]
    if: always()
    steps:
      - name: Create PR Summary
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'Code Quality': '${{ needs.code-quality.result }}',
              'Security Scan': '${{ needs.security-scan.result }}',
              'Dependencies': '${{ needs.dependencies.result }}'
            };
            
            let emoji = '✅';
            let status = 'All checks passed';
            
            if (Object.values(results).includes('failure')) {
              emoji = '❌';
              status = 'Some checks failed - review required';
            } else if (Object.values(results).includes('cancelled')) {
              emoji = '⚠️';
              status = 'Some checks were skipped';
            }
            
            const comment = `## 🔍 Review Agent Summary\n\n**Status:** ${emoji} ${status}\n\n| Check | Result |\n|-------|--------|\n${Object.entries(results).map(([k, v]) => `| ${k} | ${v} |`).join('\n')}\n\n---
*This review was automatically generated by the Review Agent*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });