name: Tests

on:
  push:
    branches: [main, develop, 'agent/**']
  pull_request:
    branches: [main, develop]

jobs:
  # This repository pins multiple external repos as submodules.
  # CI should fetch only the submodule needed for each job. Recursive checkout
  # breaks when a privately managed repo, such as working-notes, is not
  # accessible to the default GitHub Actions token in this repository.

  # Python Tests for digital-research project
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch digital-research
        run: git submodule update --init --depth 1 projects/digital-research
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        working-directory: projects/digital-research/src
        run: |
          pip install -e ".[dev]"
          pip install pytest arxiv scholarly beautifulsoup4 lxml httpx pymupdf
          
      - name: Run tests
        working-directory: projects/digital-research/src
        run: |
          python -m pytest tests/ -v --ignore=tests/test_web_crawler.py --ignore=tests/test_web_integration.py --ignore=tests/test_web_pdf_extractor.py

  # TypeScript build check for metrics-collector
  build-metrics-collector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch metrics-collector
        run: git submodule update --init --depth 1 engineering/metrics-collector
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        working-directory: engineering/metrics-collector
        run: npm ci
        
      - name: Build
        working-directory: engineering/metrics-collector
        run: npm run build

  # TypeScript build check for rook-dashboard
  build-rook-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch rook-dashboard
        run: git submodule update --init --depth 1 engineering/rook-dashboard
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        working-directory: engineering/rook-dashboard
        run: npm ci
        
      - name: Build
        working-directory: engineering/rook-dashboard
        run: npm run build

  # working-notes is validated in its own repository CI. Here we only verify
  # that rook-workspace pins a concrete revision.
  build-working-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify working-notes pin exists
        run: git submodule status --cached projects/working-notes
