types:
  # Core research entities
  ResearchProject:
    required: [name, status]
    properties:
      name: string
      status: enum [active, paused, completed]
      description: string
      goals: array
      start_date: date
      owner: reference Person
      
  # Academic sources
  Article:
    required: [title, source_type]
    properties:
      title: string
      authors: array
      source_type: enum [journal_article, monograph, edited_volume, web_article, newsletter]
      publication: string
      year: integer
      doi: string
      url: string
      abstract: text
      key_findings: text
      tags: array
      status: enum [saved, cleaned, labeled, analyzed]
      priority: enum [high, medium, low]
      
  # People
  Author:
    required: [name]
    properties:
      name: string
      email: string
      affiliation: string
      orcid: string
      expertise: array
      
  # Concepts/Theories
  Concept:
    required: [name, category]
    properties:
      name: string
      category: enum [theory, method, phenomenon, actor, platform]
      definition: text
      related_concepts: array
      
  # Sources
  Newsletter:
    required: [name, url]
    properties:
      name: string
      url: string
      category: enum [big_tech, labor, ai, global_south, academic]
      status: enum [active, paywall, broken, discontinued]
      
  # Tasks
  ResearchTask:
    required: [title, status]
    properties:
      title: string
      description: text
      status: enum [open, in_progress, blocked, done]
      priority: enum [high, medium, low]
      due_date: date
      assignee: reference Person
      related_articles: array

relations:
  authored_by:
    from_types: [Article]
    to_types: [Author]
    cardinality: many_to_many
    
  belongs_to_project:
    from_types: [Article, ResearchTask]
    to_types: [ResearchProject]
    cardinality: many_to_one
    
  discusses_concept:
    from_types: [Article]
    to_types: [Concept]
    cardinality: many_to_many
    
  cites:
    from_types: [Article]
    to_types: [Article]
    cardinality: many_to_many
    acyclic: true
    
  has_task:
    from_types: [ResearchProject]
    to_types: [ResearchTask]
    cardinality: one_to_many
    
  subscribed_to:
    from_types: [ResearchProject]
    to_types: [Newsletter]
    cardinality: many_to_many
