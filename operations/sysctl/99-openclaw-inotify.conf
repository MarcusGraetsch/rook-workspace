# OpenClaw runs a gateway, dashboard, Kubernetes tooling, and file-watching
# automation on the same VPS. The default inotify instance limit of 128 is too
# low for this workload and can make Node fs.watch fail with EMFILE.
fs.inotify.max_user_instances = 512
fs.inotify.max_user_watches = 524288
fs.inotify.max_queued_events = 32768
