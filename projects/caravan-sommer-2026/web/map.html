<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caravan-Sommer 2026 — Initiativen-Karte</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />

  <!-- Marker Cluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    :root {
      --bg: #f7f3ed;
      --fg: #1a1a1a;
      --accent: #d97706;
      --muted: #6b6b6b;
      --panel: rgba(255,255,255,0.96);
      --border: rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); }
    #app { display: flex; height: 100vh; }

    /* Sidebar */
    #sidebar {
      width: 380px;
      max-width: 95vw;
      background: var(--panel);
      backdrop-filter: blur(8px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
    }
    #sidebar header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    #sidebar h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    #sidebar .subtitle { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    #search {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
    }
    #filters {
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    #filters label { color: var(--muted); font-weight: 600; }
    #filters select {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      background: #fff;
      margin-top: 2px;
    }
    #count {
      padding: 6px 18px;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    #list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    #list li {
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    #list li:hover { background: rgba(217, 119, 6, 0.06); }
    #list li.active { background: rgba(217, 119, 6, 0.12); border-left: 3px solid var(--accent); padding-left: 15px; }
    #list .name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
    #list .meta { font-size: 11px; color: var(--muted); }
    #list .badges { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
    #list .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(0,0,0,0.06);
      color: var(--muted);
    }
    #list .badge.character-pragmatisch { background: #dbeafe; color: #1e40af; }
    #list .badge.character-gemeinschaftlich { background: #d1fae5; color: #065f46; }
    #list .badge.character-spirituell { background: #fce7f3; color: #9d174d; }
    #list .badge.character-basisdemokratisch { background: #fef3c7; color: #92400e; }
    #list .badge.character-anarchistisch { background: #fecaca; color: #991b1b; }
    #list .badge.character-ökologisch { background: #d9f99d; color: #365314; }

    /* Map */
    #map { flex: 1; height: 100%; }

    /* Popup */
    .leaflet-popup-content { font-family: inherit; min-width: 240px; max-width: 320px; }
    .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .popup-addr { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .popup-badges { margin-bottom: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
    .popup-desc { font-size: 12px; line-height: 1.4; margin-bottom: 8px; max-height: 120px; overflow-y: auto; }
    .popup-links a { display: inline-block; margin-right: 8px; font-size: 12px; color: var(--accent); text-decoration: none; }
    .popup-links a:hover { text-decoration: underline; }

    /* Mobile: hide sidebar by default, full-width map */
    @media (max-width: 700px) {
      #app { flex-direction: column; }
      #sidebar { width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
      #map { flex: 1; }
    }

    /* Toggle button for mobile */
    #toggle {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1001;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    @media (max-width: 700px) {
      #toggle { display: block; }
      #sidebar.hidden { display: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>🚐 Caravan-Sommer 2026</h1>
        <div class="subtitle" id="subtitle">Initiativen für alternative Wohnmobil-Reisen</div>
        <input type="text" id="search" placeholder="🔍 Name, Stadt, Aktivität …" />
      </header>
      <div id="filters">
        <div>
          <label for="filter-country">Land</label>
          <select id="filter-country"><option value="">Alle</option></select>
        </div>
        <div>
          <label for="filter-character">Charakter</label>
          <select id="filter-character"><option value="">Alle</option></select>
        </div>
        <div>
          <label for="filter-source">Quelle</label>
          <select id="filter-source"><option value="">Alle</option></select>
        </div>
        <div>
          <label for="filter-cost">Kosten</label>
          <select id="filter-cost"><option value="">Alle</option></select>
        </div>
      </div>
      <div id="count">— Initiativen geladen …</div>
      <div id="actions" style="padding:6px 18px;border-bottom:1px solid var(--border);display:flex;gap:6px;">
        <button id="btn-gpx" onclick="exportGPX()" style="flex:1;padding:6px 8px;background:var(--accent);color:white;border:none;border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;">📍 GPX-Export (sichtbar)</button>
        <button id="btn-csv" onclick="exportCSV()" style="flex:1;padding:6px 8px;background:#fff;color:var(--fg);border:1px solid var(--border);border-radius:4px;font-size:12px;cursor:pointer;">📋 CSV</button>
      </div>
      <ul id="list"></ul>
    </aside>
    <button id="toggle" onclick="document.getElementById('sidebar').classList.toggle('hidden')">☰ Liste</button>
    <div id="map"></div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Marker Cluster -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Data + App -->
  <script src="initiativen.js"></script>
  <script>
    // ===== App =====
    const all = (window.INITIATIVEN || []).filter(e => e.lat != null && e.lng != null);
    const allWithCount = window.INITIATIVEN || [];

    document.getElementById('subtitle').textContent = `${allWithCount.length} Initiativen · ${all.length} auf der Karte`;

    const map = L.map('map', { worldCopyJump: true }).setView([50.5, 10], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap-Mitwirkende',
      maxZoom: 19
    }).addTo(map);

    const cluster = L.markerClusterGroup({
      maxClusterRadius: 60,
      disableClusteringAtZoom: 10,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false
    });

    function charClass(c) {
      return 'character-' + (c || '').replace(/[^a-zäöüß]/gi, '-');
    }

    function makeMarker(e) {
      const m = L.marker([e.lat, e.lng]);
      const badges = [
        e.character ? `<span class="popup-badge ${charClass(e.character)}" style="padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;background:rgba(0,0,0,0.06);">${e.character}</span>` : '',
        e.cost ? `<span style="padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;background:rgba(0,0,0,0.06);">${e.cost}</span>` : '',
        e.source ? `<span style="padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;background:rgba(0,0,0,0.06);">${e.source}</span>` : ''
      ].join(' ');
      const links = [
        e.url ? `<a href="${e.url}" target="_blank" rel="noopener">Website ↗</a>` : '',
        e.email ? `<a href="mailto:${e.email}">${e.email}</a>` : ''
      ].join(' ');
      const desc = e.description ? `<div class="popup-desc">${escapeHtml(e.description).slice(0, 400)}${e.description.length > 400 ? '…' : ''}</div>` : '';
      const html = `
        <div class="popup-name">${escapeHtml(e.name)}</div>
        <div class="popup-addr">${escapeHtml(e.address || '')}</div>
        <div class="popup-badges">${badges}</div>
        ${desc}
        <div class="popup-links">${links}</div>
      `;
      m.bindPopup(html, { maxWidth: 320 });
      m._data = e;
      return m;
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // Initial render
    const markers = all.map(makeMarker);
    cluster.addLayers(markers);
    map.addLayer(cluster);
    if (all.length) {
      map.fitBounds(cluster.getBounds().pad(0.1));
    }

    // ===== Filters =====
    function uniqueValues(field) {
      const s = new Set();
      allWithCount.forEach(e => { if (e[field]) s.add(e[field]); });
      return [...s].sort();
    }
    function fillSelect(id, vals) {
      const sel = document.getElementById(id);
      vals.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        sel.appendChild(opt);
      });
    }
    fillSelect('filter-country', uniqueValues('country'));
    fillSelect('filter-character', uniqueValues('character'));
    fillSelect('filter-source', uniqueValues('source'));
    fillSelect('filter-cost', uniqueValues('cost'));

    const $search = document.getElementById('search');
    const $list = document.getElementById('list');
    const $count = document.getElementById('count');
    const $fCountry = document.getElementById('filter-country');
    const $fChar = document.getElementById('filter-character');
    const $fSource = document.getElementById('filter-source');
    const $fCost = document.getElementById('filter-cost');

    function applyFilters() {
      const q = $search.value.trim().toLowerCase();
      const fc = $fCountry.value;
      const fch = $fChar.value;
      const fs = $fSource.value;
      const fco = $fCost.value;

      const visible = allWithCount.filter(e => {
        if (fc && e.country !== fc) return false;
        if (fch && e.character !== fch) return false;
        if (fs && e.source !== fs) return false;
        if (fco && e.cost !== fco) return false;
        if (q) {
          const hay = `${e.name} ${e.address} ${e.description} ${(e.activities || []).join(' ')}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      // Update list
      $list.innerHTML = visible.slice(0, 200).map(e => `
        <li data-id="${e.id}">
          <div class="name">${escapeHtml(e.name)}</div>
          <div class="meta">${escapeHtml(e.address || '')}</div>
          <div class="badges">
            ${e.character ? `<span class="badge ${charClass(e.character)}">${e.character}</span>` : ''}
            ${e.cost ? `<span class="badge">${e.cost}</span>` : ''}
            ${e.source ? `<span class="badge">${e.source}</span>` : ''}
          </div>
        </li>
      `).join('');

      // Update map markers
      const visibleIds = new Set(visible.filter(e => e.lat != null).map(e => e.id));
      cluster.clearLayers();
      const visibleMarkers = visible.filter(e => e.lat != null).map(makeMarker);
      cluster.addLayers(visibleMarkers);

      $count.textContent = `${visible.length} sichtbar (von ${allWithCount.length} gesamt)`;
    }

    // List click → pan to marker + open popup
    $list.addEventListener('click', ev => {
      const li = ev.target.closest('li[data-id]');
      if (!li) return;
      const id = li.dataset.id;
      const entry = allWithCount.find(e => e.id === id);
      if (!entry || entry.lat == null) return;
      document.querySelectorAll('#list li.active').forEach(el => el.classList.remove('active'));
      li.classList.add('active');
      map.setView([entry.lat, entry.lng], 13);
      // Find marker in cluster
      cluster.eachLayer(m => {
        if (m._data && m._data.id === id) {
          m.openPopup();
        }
      });
    });

    [$search, $fCountry, $fChar, $fSource, $fCost].forEach(el => el.addEventListener('input', applyFilters));
    applyFilters();

    // ===== GPX Export =====
    // Use the same filter logic as the map to get visible entries
    function getVisibleEntries() {
      const q = $search.value.trim().toLowerCase();
      const fc = $fCountry.value;
      const fch = $fChar.value;
      const fs = $fSource.value;
      const fco = $fCost.value;
      return allWithCount.filter(e => {
        if (fc && e.country !== fc) return false;
        if (fch && e.character !== fch) return false;
        if (fs && e.source !== fs) return false;
        if (fco && e.cost !== fco) return false;
        if (q) {
          const hay = `${e.name} ${e.address} ${e.description} ${(e.activities || []).join(' ')}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return e.lat != null && e.lng != null;
      });
    }

    function exportGPX() {
      const visible = getVisibleEntries();
      if (!visible.length) {
        alert('Keine sichtbaren Initiativen mit Koordinaten. Filter lockern?');
        return;
      }
      const esc = s => String(s || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
      let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n';
      gpx += '<gpx version="1.1" creator="Caravan-Sommer-2026" xmlns="http://www.topografix.com/GPX/1/1">\n';
      gpx += '  <metadata>\n';
      gpx += `    <name>Caravan-Sommer 2026 – ${visible.length} Initiativen</name>\n`;
      gpx += `    <desc>Generiert ${new Date().toISOString()} aus Caravan-Sommer-2026 Datenbank</desc>\n`;
      gpx += '  </metadata>\n';
      for (const e of visible) {
        gpx += `  <wpt lat="${e.lat}" lon="${e.lng}">\n`;
        gpx += `    <name>${esc(e.name)}</name>\n`;
        const desc = [e.address, e.character, e.cost, e.url].filter(Boolean).join(' | ');
        gpx += `    <desc>${esc(desc)}</desc>\n`;
        if (e.url) gpx += `    <link href="${esc(e.url)}"/>\n`;
        gpx += `    <type>${esc(e.character || 'initiative')}</type>\n`;
        gpx += '  </wpt>\n';
      }
      gpx += '</gpx>\n';
      downloadFile(gpx, `caravan-sommer-2026-${new Date().toISOString().slice(0,10)}.gpx`, 'application/gpx+xml');
    }

    function exportCSV() {
      const visible = getVisibleEntries();
      if (!visible.length) {
        alert('Keine sichtbaren Initiativen mit Koordinaten. Filter lockern?');
        return;
      }
      const cols = ['name', 'country', 'city', 'address', 'character', 'cost', 'source', 'url', 'email', 'lat', 'lng'];
      let csv = cols.join(',') + '\n';
      const esc = s => {
        s = String(s || '');
        if (s.includes(',') || s.includes('"') || s.includes('\n')) {
          return '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      };
      for (const e of visible) {
        csv += cols.map(c => esc(e[c])).join(',') + '\n';
      }
      downloadFile(csv, `caravan-sommer-2026-${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
    }

    function downloadFile(content, filename, mime) {
      const blob = new Blob([content], {type: mime});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
